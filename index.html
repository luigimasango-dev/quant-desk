<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>ULC · Quant Desk</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{--bg:#0A0B0F;--panel:#13151C;--panel2:#0F1116;--bd:#242733;--bs:#1B1E27;--tx:#E8EAF0;--mu:#7C8296;--fa:#4B4F5E;--gd:#C9A227;--gr:#34D399;--rd:#F87171;--bl:#60A5FA}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:-apple-system,'Segoe UI',Roboto,sans-serif;padding-bottom:76px}
.mono{font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace}
header{display:flex;justify-content:space-between;align-items:center;padding:14px 14px 8px}
.brand{font-size:9px;letter-spacing:.25em;text-transform:uppercase;color:var(--gd)}
h1{font-size:18px}h1 span{color:var(--gd)}
.hbtn{background:none;border:1px solid var(--bd);border-radius:7px;color:var(--mu);font-size:12px;padding:6px 10px}
.tabs{display:flex;gap:5px;overflow-x:auto;padding:6px 14px}
.tab{flex:none;font-size:12px;padding:7px 11px;border-radius:8px;border:1px solid var(--bd);color:var(--mu);background:none;font-weight:600}
.tab.on{background:var(--gd);color:#0A0B0F;border-color:var(--gd)}
main{max-width:600px;margin:0 auto;padding:8px 12px;display:flex;flex-direction:column;gap:10px}
.card{background:var(--panel);border:1px solid var(--bd);border-radius:11px;padding:12px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.f{display:flex;flex-direction:column;gap:3px}
.f span{font-size:9px;text-transform:uppercase;letter-spacing:.07em;color:var(--mu)}
input,select{background:var(--panel2);border:1px solid var(--bd);border-radius:8px;color:var(--tx);padding:9px;font-size:16px;outline:none;width:100%}
input:focus{border-color:var(--gd)}
.name{background:none;border:none;border-bottom:1px solid var(--bs);border-radius:0;font-weight:600;font-size:14px;padding:4px 0}
.name.a{color:var(--gd)}.name.b{color:var(--bl);text-align:right}
.lams{display:flex;justify-content:space-around;margin-top:10px;padding-top:10px;border-top:1px solid var(--bs);text-align:center}
.lams .k{font-size:9px;text-transform:uppercase;color:var(--mu)}
.lams .v{font-size:18px;font-weight:600}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
.chip{font-size:10px;padding:3px 8px;border-radius:5px;background:var(--panel2);border:1px solid var(--bs)}
.chip b{color:var(--gd)}
.sect{display:flex;align-items:center;gap:7px;padding:12px 2px 5px}
.sect .t{font-size:10px;letter-spacing:.13em;text-transform:uppercase;font-weight:700;color:var(--mu)}
.sect .line{flex:1;height:1px;background:var(--bs)}
.sect select,.sect input{width:auto;padding:5px 7px;font-size:12px}
.sect .side{display:flex;border:1px solid var(--bd);border-radius:7px;overflow:hidden}
.sect .side button{border:none;background:none;color:var(--mu);font-size:11px;font-weight:600;padding:5px 9px}
.sect .side button.on{background:var(--gd);color:#0A0B0F}
.row{display:grid;grid-template-columns:1fr 54px 62px 50px;gap:6px;align-items:center;padding:7px 2px;border-bottom:1px solid var(--bs);font-size:13px}
.row:last-of-type{border-bottom:none}
.row .p{color:var(--gd);font-weight:600;font-size:12.5px;text-align:right}
.row input{padding:5px 6px;font-size:13px;text-align:right}
.row .e{font-size:11px;font-weight:700;text-align:right}
.sub{font-size:10px;color:var(--fa);padding:1px 2px 6px}
.board .bh{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.board .bh .t{font-size:10px;letter-spacing:.13em;text-transform:uppercase;font-weight:700;color:var(--gd)}
.brow{display:grid;grid-template-columns:1fr 46px 50px 62px;gap:5px;padding:6px 0;border-bottom:1px solid var(--bs);font-size:12.5px;align-items:center}
.brow:last-child{border-bottom:none}
.brow .o{color:var(--mu);text-align:right;font-size:11px}
.brow .st{text-align:right;font-weight:700;font-size:11.5px}
.adv{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--bs);flex-direction:column;gap:8px}
.adv.open{display:flex}
.sl .top{display:flex;justify-content:space-between;font-size:9px;text-transform:uppercase;color:var(--mu)}
.sl .top b{color:var(--gd)}
input[type=range]{accent-color:var(--gd);padding:0}
.note{font-size:9px;color:var(--fa);text-align:center;padding:2px 12px 6px;line-height:1.5}
.bar{position:fixed;bottom:0;left:0;right:0;padding:10px 14px calc(10px + env(safe-area-inset-bottom));background:linear-gradient(transparent,var(--bg) 35%)}
.bar button{width:100%;padding:13px;border-radius:10px;border:none;background:var(--gd);color:#0A0B0F;font-weight:800;font-size:14px}
.g{color:var(--gr)}.r{color:var(--rd)}.m{color:var(--mu)}.fa2{color:var(--fa)}
</style>
</head>
<body>
<header>
  <div><div class="brand">ULC · Quant Desk</div><h1>Poisson <span>Engine</span></h1></div>
  <div style="display:flex;gap:6px">
    <button class="hbtn" id="gear">⚙</button>
    <button class="hbtn" id="reset">↺</button>
  </div>
</header>
<div class="tabs" id="tabs"></div>
<main>
  <div class="card" id="in"></div>
  <div class="card" id="mk"></div>
  <div class="card board" id="bd" style="display:none"></div>
  <p class="note" id="fn"></p>
</main>
<div class="bar"><button id="copy">📋 Copy CLV summary</button></div>

<script>
const tg=window.Telegram&&window.Telegram.WebApp;
if(tg){tg.ready();tg.expand();try{tg.setHeaderColor('#0A0B0F');tg.setBackgroundColor('#0A0B0F')}catch(e){}}
const hap=s=>{try{tg&&tg.HapticFeedback.impactOccurred(s||'light')}catch(e){}};

// ---------- storage (Telegram DeviceStorage → localStorage fallback) ----------
const store={
  set(k,v){const s=JSON.stringify(v);
    if(tg&&tg.DeviceStorage&&tg.DeviceStorage.setItem){try{tg.DeviceStorage.setItem(k,s,()=>{});return}catch(e){}}
    try{localStorage.setItem(k,s)}catch(e){}},
  get(k,cb){
    if(tg&&tg.DeviceStorage&&tg.DeviceStorage.getItem){try{tg.DeviceStorage.getItem(k,(err,v)=>{cb(v?JSON.parse(v):null)});return}catch(e){}}
    try{const v=localStorage.getItem(k);cb(v?JSON.parse(v):null)}catch(e){cb(null)}}
};

// ---------- sports ----------
function qr(a,b,s){const o=[];for(let x=a;x<=b+1e-9;x+=s)o.push(Math.round(x*4)/4);return o}
const SP={
 fb:{n:"⚽",name:"Football",e:"p",u:"goals",grid:13,dc:1,btts:1,tw:1,d:["1.6","1.1","1.3","1.4"],ah:qr(-3,3,.25),ahD:-0.5,ou:qr(0.5,4.5,.25).filter(x=>x<=4||x===4.5),ouD:2.5,tt:[0.5,1.5,2.5],ttD:1.5,hM:.3,st:.1},
 hk:{n:"🏒",name:"Hockey",e:"p",u:"goals",grid:16,dc:0,btts:1,tw:1,d:["3.1","2.7","2.9","3.0"],ah:qr(-3,3,.5),ahD:-1.5,ou:[4.5,5,5.5,6,6.5,7,7.5],ouD:5.5,tt:[1.5,2.5,3.5],ttD:2.5,hM:.2,st:.1},
 bs:{n:"⚾",name:"Baseball",e:"p",u:"runs",grid:18,dc:0,btts:0,tw:0,d:["4.6","4.1","4.3","4.5"],ah:qr(-3,3,.5),ahD:-1.5,ou:[6.5,7,7.5,8,8.5,9,9.5,10.5],ouD:8.5,tt:[2.5,3.5,4.5],ttD:4.5,hM:.15,st:.1},
 bb:{n:"🏀",name:"Basketball",e:"g",u:"pts",d:["112","108","106","111"],sdT:13.5,sdS:12,hM:4,st:.5},
 hb:{n:"🤾",name:"Handball",e:"g",u:"goals",d:["29","27","28","30"],sdT:7.5,sdS:6.5,hM:3,st:.5},
};

// ---------- math ----------
function pmf(k,l){if(l<=0)return k===0?1:0;let lp=-l+k*Math.log(l);for(let i=2;i<=k;i++)lp-=Math.log(i);return Math.exp(lp)}
function tau(i,j,a,b,r){if(i===0&&j===0)return 1-a*b*r;if(i===0&&j===1)return 1+a*r;if(i===1&&j===0)return 1+b*r;if(i===1&&j===1)return 1-r;return 1}
function nC(x){const t=1/(1+.2316419*Math.abs(x)),d=.3989423*Math.exp(-x*x/2);const p=d*t*(.3193815+t*(-.3565638+t*(1.781478+t*(-1.821256+t*1.330274))));return x>0?1-p:p}
function grid(a,b,G,r){const m=[];let T=0;for(let i=0;i<G;i++){const w=[];for(let j=0;j<G;j++){let p=pmf(i,a)*pmf(j,b);if(r)p*=tau(i,j,a,b,r);p=Math.max(0,p);w.push(p);T+=p}m.push(w)}for(let i=0;i<G;i++)for(let j=0;j<G;j++)m[i][j]/=T;return m}
function ahHF(m,h,s){let w=0,p=0,l=0;const G=m.length;for(let i=0;i<G;i++)for(let j=0;j<G;j++){const d=s==="A"?i-j:j-i,r=d+h,q=m[i][j];if(Math.abs(r)<1e-9)p+=q;else if(r>0)w+=q;else l+=q}return{w,p,l}}
function AH(m,h,s){if(Math.abs((h*4)%2)!==1)return ahHF(m,h,s);const a=ahHF(m,h-.25,s),b=ahHF(m,h+.25,s);return{w:(a.w+b.w)/2,p:(a.p+b.p)/2,l:(a.l+b.l)/2}}
function OU(m,L){const G=m.length;const half=x=>{let o=0,pu=0;for(let i=0;i<G;i++)for(let j=0;j<G;j++){const t=i+j;if(t>x)o+=m[i][j];else if(t===x)pu+=m[i][j]}return{w:o,p:pu,l:1-o-pu}};if(Math.abs((L*4)%2)!==1)return half(L);const a=half(L-.25),b=half(L+.25);return{w:(a.w+b.w)/2,p:(a.p+b.p)/2,l:(a.l+b.l)/2}}
const eff=o=>o.w+o.l>0?o.w/(o.w+o.l):0;
function tOv(l,L){let s=0;for(let k=0;k<=Math.floor(L);k++)s+=pmf(k,l);return 1-s}
function kQ(p,o){const b=o-1;return b<=0?0:Math.max(0,((b*p-(1-p))/b)*.25)}
const pc=x=>(x*100).toFixed(1)+"%";
const pf=v=>{const n=parseFloat(v);return isNaN(n)?0:n};

// ---------- state ----------
let st;
function fresh(sk){const S=SP[sk];
  st={sk,tA:"Team A",tB:"Team B",aS:S.d[0],aC:S.d[1],bS:S.d[2],bC:S.d[3],
    hfa:0,rho:0,sdT:S.sdT||0,sdS:S.sdS||0,bank:"100",
    ahSide:"A",ahSel:S.ahD!==undefined?S.ahD:0,ouSel:S.ouD,ttSel:S.ttD,
    gT:"",gS:"-2.5",gTt:"",odds:{}};
  if(S.e==="g"){const t=(pf(S.d[0])+pf(S.d[3]))/2+(pf(S.d[2])+pf(S.d[1]))/2;
    st.gT=String(Math.round(t)+.5);st.gTt=String(Math.round(t/2)+.5)}}
let saveTimer;
function save(){clearTimeout(saveTimer);saveTimer=setTimeout(()=>store.set("qd",st),400)}

// ---------- model ----------
function model(){const S=SP[st.sk];
  const muA=S.e==="p"?((pf(st.aS)+pf(st.bC))/2)*(1+st.hfa):(pf(st.aS)+pf(st.bC))/2+st.hfa;
  const muB=(pf(st.bS)+pf(st.aC))/2;
  const M={S,muA,muB};
  if(S.e==="p"){M.m=grid(muA,muB,S.grid,S.dc?st.rho:0);
    let h=0,d=0,a=0,bt=0;const sl=[];
    for(let i=0;i<S.grid;i++)for(let j=0;j<S.grid;j++){const p=M.m[i][j];
      if(i>j)h+=p;else if(i===j)d+=p;else a+=p;if(i>=1&&j>=1)bt+=p;if(i<7&&j<7)sl.push([i,j,p])}
    sl.sort((x,y)=>y[2]-x[2]);Object.assign(M,{home:h,draw:d,away:a,btts:bt,sl})}
  return M}

function prob(key,M){const[k,...r]=key.split("|");const S=M.S;
  if(k==="ah")return eff(AH(M.m,parseFloat(r[0]),r[1]));
  if(k==="oO")return eff(OU(M.m,parseFloat(r[0])));
  if(k==="oU"){const o=OU(M.m,parseFloat(r[0]));return eff({w:o.l,p:o.p,l:o.w})}
  if(k==="bY")return M.btts;if(k==="bN")return 1-M.btts;
  if(k==="tA")return tOv(M.muA,parseFloat(r[0]));if(k==="tB")return tOv(M.muB,parseFloat(r[0]));
  if(k==="h")return M.home;if(k==="d")return M.draw;if(k==="a")return M.away;
  if(k==="mA")return M.home/(M.home+M.away);if(k==="mB")return M.away/(M.home+M.away);
  const muT=M.muA+M.muB,muM=M.muA-M.muB;
  if(k==="gm"){const w=1-nC((0-muM)/st.sdS);return r[0]==="A"?w:1-w}
  if(k==="gs"){const m=r[1]==="A"?muM:-muM;return 1-nC((0-(m+parseFloat(r[0])))/st.sdS)}
  if(k==="gO")return 1-nC((parseFloat(r[0])-muT)/st.sdT);
  if(k==="gU")return nC((parseFloat(r[0])-muT)/st.sdT);
  if(k==="gA")return 1-nC((parseFloat(r[0])-M.muA)/(st.sdT/Math.SQRT2));
  if(k==="gB")return 1-nC((parseFloat(r[0])-M.muB)/(st.sdT/Math.SQRT2));
  return 0}
const GROW=k=>/^(ah|oO|oU|gs|gO|gU)/.test(k);
function lbl(key){const[k,...r]=key.split("|");const A=st.tA,B=st.tB;
  const m={bY:"BTTS Yes",bN:"BTTS No",h:A+" Win",d:"Draw",a:B+" Win",mA:A+" ML",mB:B+" ML"};
  if(m[k])return m[k];
  if(k==="ah"||k==="gs")return`${r[1]==="A"?A:B} ${r[0]>0?"+":""}${r[0]}`;
  if(k==="oO"||k==="gO")return`Over ${r[0]}`;if(k==="oU"||k==="gU")return`Under ${r[0]}`;
  if(k==="tA"||k==="gA")return`${A} O ${r[0]}`;if(k==="tB"||k==="gB")return`${B} O ${r[0]}`;
  if(k==="gm")return`${r[0]==="A"?A:B} ML`;return key}

// ---------- render ----------
const $=id=>document.getElementById(id);
function rTabs(){$("tabs").innerHTML=Object.entries(SP).map(([k,s])=>
  `<button class="tab ${st.sk===k?'on':''}" data-k="${k}">${s.n} ${s.name}</button>`).join("");
  $("tabs").querySelectorAll("button").forEach(b=>b.onclick=()=>{hap();fresh(b.dataset.k);save();rAll()})}

function rIn(){const S=SP[st.sk],M=model(),g=S.e==="g";
  $("in").innerHTML=`
  <div class="g2">
    <div style="display:flex;flex-direction:column;gap:8px">
      <input class="name a" id="tA" value="${st.tA}">
      <label class="f"><span>Scored avg</span><input type="number" inputmode="decimal" id="aS" value="${st.aS}"></label>
      <label class="f"><span>Conceded avg</span><input type="number" inputmode="decimal" id="aC" value="${st.aC}"></label>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px">
      <input class="name b" id="tB" value="${st.tB}">
      <label class="f"><span>Scored avg</span><input type="number" inputmode="decimal" id="bS" value="${st.bS}"></label>
      <label class="f"><span>Conceded avg</span><input type="number" inputmode="decimal" id="bC" value="${st.bC}"></label>
    </div>
  </div>
  <div class="lams">
    <div><div class="k">μ ${st.tA}</div><div class="v mono" style="color:var(--gd)" id="lA"></div></div>
    <div><div class="k">Total</div><div class="v mono" id="lT"></div></div>
    <div><div class="k">μ ${st.tB}</div><div class="v mono" style="color:var(--bl)" id="lB"></div></div>
  </div>
  <div class="chips" id="sl"></div>
  <div class="adv" id="adv">
    <div class="sl"><div class="top"><span>Home adv (assumption)</span><b id="hV"></b></div>
      <input type="range" id="hR" min="0" max="${S.hM}" step="${g?0.5:0.01}" value="${st.hfa}"></div>
    ${S.dc?`<div class="sl"><div class="top"><span>Dixon-Coles ρ</span><b id="rV"></b></div>
      <input type="range" id="rR" min="-0.2" max="0" step="0.01" value="${st.rho}"></div>`:""}
    ${g?`<div class="sl"><div class="top"><span>σ total</span><b id="sTV"></b></div>
      <input type="range" id="sTR" min="4" max="22" step="0.5" value="${st.sdT}"></div>
      <div class="sl"><div class="top"><span>σ spread</span><b id="sSV"></b></div>
      <input type="range" id="sSR" min="3" max="18" step="0.5" value="${st.sdS}"></div>`:""}
    <div class="sl"><div class="top"><span>Bankroll R</span></div>
      <input type="number" inputmode="decimal" id="bk" value="${st.bank}" style="font-size:13px;padding:6px"></div>
  </div>`;
  $("tA").oninput=e=>{st.tA=e.target.value;save();rMk();rBd()};
  $("tB").oninput=e=>{st.tB=e.target.value;save();rMk();rBd()};
  ["aS","aC","bS","bC"].forEach(k=>$(k).oninput=e=>{st[k]=e.target.value;save();rTop();rMk();rBd()});
  $("hR").oninput=e=>{st.hfa=parseFloat(e.target.value);save();rTop();rMk();rBd()};
  if(S.dc)$("rR").oninput=e=>{st.rho=parseFloat(e.target.value);save();rTop();rMk();rBd()};
  if(g){$("sTR").oninput=e=>{st.sdT=parseFloat(e.target.value);save();rTop();rMk();rBd()};
       $("sSR").oninput=e=>{st.sdS=parseFloat(e.target.value);save();rTop();rMk();rBd()}}
  $("bk").oninput=e=>{st.bank=e.target.value;save();rBd()};
  rTop()}

function rTop(){const S=SP[st.sk],M=model(),g=S.e==="g";
  $("lA").textContent=M.muA.toFixed(g?1:2);
  $("lB").textContent=M.muB.toFixed(g?1:2);
  $("lT").textContent=(M.muA+M.muB).toFixed(g?1:2);
  $("sl").innerHTML=S.e==="p"?M.sl.slice(0,5).map(s=>`<span class="chip mono">${s[0]}-${s[1]} <b>${pc(s[2])}</b></span>`).join(""):
    `<span class="chip mono">margin <b>${st.tA} ${(M.muA-M.muB)>=0?"+":""}${(M.muA-M.muB).toFixed(1)}</b></span><span class="chip mono">σT ${st.sdT} · σS ${st.sdS}</span>`;
  const hV=$("hV");if(hV)hV.textContent=st.hfa===0?"off":(g?"+"+st.hfa.toFixed(1):"×"+(1+st.hfa).toFixed(2));
  const rV=$("rV");if(rV)rV.textContent=st.rho===0?"off":st.rho.toFixed(2);
  const sTV=$("sTV");if(sTV)sTV.textContent=st.sdT;const sSV=$("sSV");if(sSV)sSV.textContent=st.sdS}

function row(key,label,M){return`<div class="row" data-key="${key}">
  <span>${label}</span><span class="p mono">${pc(prob(key,M))}</span>
  <input type="number" inputmode="decimal" step="0.01" placeholder="odds" value="${st.odds[key]||""}">
  <span class="e mono"></span></div>`}
function sect(t,extra){return`<div class="sect"><span class="t">${t}</span>${extra||""}<div class="line"></div></div>`}

function rMk(){const S=SP[st.sk],M=model();let h="";
  if(S.e==="p"){
    const side=`<div class="side"><button data-s="A" class="${st.ahSide==="A"?"on":""}">${st.tA}</button><button data-s="B" class="${st.ahSide==="B"?"on":""}">${st.tB}</button></div>`;
    h+=sect("Handicap",side+`<select id="ahS">${S.ah.map(x=>`<option ${x===st.ahSel?"selected":""} value="${x}">${x>0?"+":""}${x}</option>`).join("")}</select>`);
    const o=AH(M.m,st.ahSel,st.ahSide);
    h+=row(`ah|${st.ahSel}|${st.ahSide}`,`${st.ahSide==="A"?st.tA:st.tB} ${st.ahSel>0?"+":""}${st.ahSel}`,M);
    h+=`<div class="sub mono">W ${pc(o.w)} · P ${pc(o.p)} · L ${pc(o.l)} · other side ${pc(eff(AH(M.m,-st.ahSel,st.ahSide==="A"?"B":"A")))}</div>`;
    h+=sect("Total O/U",`<select id="ouS">${S.ou.map(x=>`<option ${x===st.ouSel?"selected":""} value="${x}">${x}</option>`).join("")}</select>`);
    h+=row(`oO|${st.ouSel}`,`Over ${st.ouSel}`,M)+row(`oU|${st.ouSel}`,`Under ${st.ouSel}`,M);
    if(S.btts)h+=sect("BTTS")+row("bY","BTTS Yes",M)+row("bN","BTTS No",M);
    h+=sect("Team Totals",`<select id="ttS">${S.tt.map(x=>`<option ${x===st.ttSel?"selected":""} value="${x}">O ${x}</option>`).join("")}</select>`);
    h+=row(`tA|${st.ttSel}`,`${st.tA} O ${st.ttSel}`,M)+row(`tB|${st.ttSel}`,`${st.tB} O ${st.ttSel}`,M);
    if(S.tw)h+=sect("Result")+row("h",`${st.tA} Win`,M)+row("d","Draw",M)+row("a",`${st.tB} Win`,M);
    else h+=sect("Moneyline")+row("mA",`${st.tA} ML`,M)+row("mB",`${st.tB} ML`,M);
  }else{
    h+=sect("Total O/U",`<input id="gT" type="number" inputmode="decimal" step="0.5" style="width:78px" value="${st.gT}">`);
    h+=row(`gO|${pf(st.gT)}`,`Over ${st.gT}`,M)+row(`gU|${pf(st.gT)}`,`Under ${st.gT}`,M);
    const side=`<div class="side"><button data-s="A" class="${st.ahSide==="A"?"on":""}">${st.tA}</button><button data-s="B" class="${st.ahSide==="B"?"on":""}">${st.tB}</button></div>`;
    h+=sect("Spread",side+`<input id="gS" type="number" inputmode="decimal" step="0.5" style="width:70px" value="${st.gS}">`);
    const sp=pf(st.gS);
    h+=row(`gs|${sp}|${st.ahSide}`,`${st.ahSide==="A"?st.tA:st.tB} ${sp>0?"+":""}${sp}`,M);
    h+=`<div class="sub mono">other side ${pc(prob(`gs|${-sp}|${st.ahSide==="A"?"B":"A"}`,M))}</div>`;
    h+=sect("Team Totals",`<input id="gTt" type="number" inputmode="decimal" step="0.5" style="width:78px" value="${st.gTt}">`);
    h+=row(`gA|${pf(st.gTt)}`,`${st.tA} O ${st.gTt}`,M)+row(`gB|${pf(st.gTt)}`,`${st.tB} O ${st.gTt}`,M);
    h+=sect("Moneyline")+row("gm|A",`${st.tA} ML`,M)+row("gm|B",`${st.tB} ML`,M);
  }
  $("mk").innerHTML=h;
  $("mk").querySelectorAll(".side button").forEach(b=>b.onclick=()=>{hap();st.ahSide=b.dataset.s;save();rMk();rBd()});
  const sel=(id,key)=>{const e=$(id);if(e)e.onchange=ev=>{st[key]=parseFloat(ev.target.value);save();rMk();rBd()}};
  sel("ahS","ahSel");sel("ouS","ouSel");sel("ttS","ttSel");
  [["gT","gT"],["gS","gS"],["gTt","gTt"]].forEach(([id,key])=>{const e=$(id);if(e)e.onchange=ev=>{st[key]=ev.target.value;save();rMk();rBd()}});
  $("mk").querySelectorAll(".row").forEach(r=>{
    const key=r.dataset.key,inp=r.querySelector("input");
    inp.oninput=()=>{st.odds[key]=inp.value;save();cell(r,key);rBd()};
    cell(r,key)})}

function cell(r,key){const M=model(),o=parseFloat(st.odds[key]),e=r.querySelector(".e");
  if(!o||o<=1){e.textContent="";return}
  const ed=(prob(key,M)-1/o)*100;
  e.textContent=(ed>=0?"+":"")+ed.toFixed(1);
  e.className="e mono "+(ed>=5?"g":ed<=-5?"r":"m")}

function legs(M){const out=[];
  for(const[k,v]of Object.entries(st.odds)){const o=parseFloat(v);if(!o||o<=1)continue;
    out.push({k,o,p:prob(k,M),e:(prob(k,M)-1/o)*100})}
  return out.sort((a,b)=>b.e-a.e)}

function rBd(){const M=model(),L=legs(M),bk=pf(st.bank);
  if(!L.length){$("bd").style.display="none";return}
  $("bd").style.display="";
  $("bd").innerHTML=`<div class="bh"><span class="t">⚡ Edge Board</span><span class="fa2 mono" style="font-size:10px">bank R${bk} · stop R${(bk*.7).toFixed(0)}</span></div>`+
    L.map(l=>{const q=GROW(l.k)&&l.e>=5;const s2=q?kQ(l.p,l.o)*bk:0;
      return`<div class="brow"><span>${q?"🛡 ":""}${lbl(l.k)}</span>
        <span class="o mono">@${l.o.toFixed(2)}</span>
        <span class="e mono ${l.e>=5?"g":l.e<=-5?"r":"m"}" style="text-align:right">${l.e>=0?"+":""}${l.e.toFixed(1)}</span>
        <span class="st mono ${q?"g":"fa2"}">${q?"R"+s2.toFixed(2):l.e>=5?"fun":"—"}</span></div>`}).join("")}

function summary(){const M=model(),S=M.S,g=S.e==="g";
  const L=[`${st.tA} vs ${st.tB} — ${S.n} ${S.name}`,
    `μA ${M.muA.toFixed(g?1:2)} | μB ${M.muB.toFixed(g?1:2)} | Tot ${(M.muA+M.muB).toFixed(g?1:2)} ${S.u}`];
  if(st.hfa)L.push(`⚠ HFA ${g?"+"+st.hfa:"×"+(1+st.hfa).toFixed(2)} (assumption)`);
  if(st.rho)L.push(`DC ρ=${st.rho}`);
  if(!g)L.push(`Top: ${M.sl.slice(0,3).map(s=>`${s[0]}-${s[1]} ${pc(s[2])}`).join(", ")}`);
  legs(M).forEach(l=>L.push(`${lbl(l.k)} | true ${pc(l.p)} | @${l.o.toFixed(2)} | edge ${l.e>=0?"+":""}${l.e.toFixed(1)}pp | close: ____`));
  return L.join("\n")}

$("copy").onclick=()=>{hap("medium");const t=summary();
  navigator.clipboard.writeText(t).then(()=>{$("copy").textContent="✅ Copied";setTimeout(()=>$("copy").textContent="📋 Copy CLV summary",1400)})
  .catch(()=>alert(t))};
$("gear").onclick=()=>{hap();$("adv").classList.toggle("open")};
$("reset").onclick=()=>{hap();fresh(st.sk);save();rAll()};

function rAll(){rTabs();rIn();rMk();rBd();
  $("fn").textContent=SP[st.sk].e==="p"
    ?"Independent Poisson. Odds optional — enter to see edge (≥+5 green = pursue). 🛡 ¼-Kelly stake. Auto-saves."
    :"Normal model (large-λ Poisson). σ = assumptions (⚙). Odds optional. 🛡 ¼-Kelly. Auto-saves."}

fresh("fb");
store.get("qd",v=>{if(v&&v.sk&&SP[v.sk]){st=Object.assign(st,v)}rAll()});
</script>
</body>
